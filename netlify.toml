# Netlify deployment config for the Expo web export.
# Build command produces a static `dist/` bundle; Netlify serves it as a SPA.

[build]
  command = "npx expo export --platform web --output-dir dist"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Expo Router uses client-side routing with output: "single".
# Every route must fall through to index.html so deep links work.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Basic caching for the Metro-hashed static assets.
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
